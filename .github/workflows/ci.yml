name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict default GITHUB_TOKEN permissions to read-only
permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  FRONTEND_COVERAGE_THRESHOLD: 10
  BACKEND_COVERAGE_THRESHOLD: 60
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository_owner }}/le-sesame-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository_owner }}/le-sesame-frontend

jobs:
  # ============================================
  # Frontend Jobs
  # ============================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci
        env:
          CI: true

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage from coverage summary if available
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "Line coverage: $COVERAGE%"
            
            if (( $(echo "$COVERAGE < ${{ env.FRONTEND_COVERAGE_THRESHOLD }}" | bc -l) )); then
              echo "❌ Coverage ($COVERAGE%) is below the threshold (${{ env.FRONTEND_COVERAGE_THRESHOLD }}%)"
              exit 1
            else
              echo "✅ Coverage ($COVERAGE%) meets the threshold (${{ env.FRONTEND_COVERAGE_THRESHOLD }}%)"
            fi
          else
            echo "⚠️ Coverage summary not found, skipping threshold check"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/report.xml
          retention-days: 7

  # ============================================
  # Backend Jobs
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "test-secret-key-for-ci"
          ENVIRONMENT: "testing"
          DEBUG: "false"
          LOG_LEVEL: "WARNING"
        run: |
          mkdir -p reports
          pytest --ignore=tests/e2e --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=${{ env.BACKEND_COVERAGE_THRESHOLD }} --junitxml=reports/junit.xml -v

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-coverage-report
          path: |
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-test-results
          path: backend/reports/
          retention-days: 7

  # ============================================
  # Summary Job
  # ============================================
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [frontend-build, frontend-test, backend-test]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.frontend-build.result }}" != "success" ] && [ "${{ needs.frontend-build.result }}" != "skipped" ]; then
            echo "❌ Frontend build failed"
            exit 1
          fi
          if [ "${{ needs.frontend-test.result }}" != "success" ] && [ "${{ needs.frontend-test.result }}" != "skipped" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.backend-test.result }}" != "success" ] && [ "${{ needs.backend-test.result }}" != "skipped" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"

  # ============================================
  # Build and Push Docker Images
  # ============================================
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [ci-complete]
    environment: dev

    # TEMPORARILY DISABLED - uncomment condition below to re-enable
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract version tag
        id: meta
        run: |
          echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Backend image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_ENABLE_AUTH=${{ secrets.NEXT_PUBLIC_ENABLE_AUTH }}
            NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Summary
        run: |
          echo "## 🐳 Docker Images Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Deployment Job
  # ============================================
  deploy:
    name: Deploy to Remote Server
    runs-on: ubuntu-latest
    needs: [build-and-push]
    
    # TEMPORARILY DISABLED - uncomment condition below to re-enable
    if: github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pre-cleanup (ensure no leftover files from previous runs)
        run: |
          sudo shred -fuz /tmp/vpn_private_key.pem 2>/dev/null || true
          sudo shred -fuz /tmp/openvpn_config.ovpn 2>/dev/null || true
          sudo rm -f /tmp/openvpn.log 2>/dev/null || true
          sudo shred -fuz ~/.ssh/id_rsa 2>/dev/null || true
          sudo pkill openvpn 2>/dev/null || true
          sudo ip link delete tun0 2>/dev/null || true
          echo "✅ Pre-cleanup completed"

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn

      - name: Setup VPN private key
        run: |
          set +x
          umask 077
          touch /tmp/vpn_private_key.pem
          chmod 600 /tmp/vpn_private_key.pem
          echo "${{ secrets.VPN_PRIVATE_KEY }}" > /tmp/vpn_private_key.pem
          
          if [ -s /tmp/vpn_private_key.pem ]; then
            echo "✅ VPN private key created securely"
          else
            echo "❌ Failed to create VPN private key"
            exit 1
          fi

      - name: Setup OpenVPN config
        run: |
          set +x
          umask 077
          touch /tmp/openvpn_config.ovpn
          chmod 600 /tmp/openvpn_config.ovpn
          echo "${{ secrets.OPENVPN_CONFIG }}" > /tmp/openvpn_config.ovpn
          
          if [ -s /tmp/openvpn_config.ovpn ]; then
            echo "✅ OpenVPN config created securely"
          else
            echo "❌ Failed to create OpenVPN config"
            exit 1
          fi

      - name: Connect to VPN
        run: |
          sudo openvpn \
            --config /tmp/openvpn_config.ovpn \
            --daemon \
            --log /tmp/openvpn.log \
            --auth-nocache \
            --script-security 1
          
          echo "⏳ Waiting for VPN connection..."
          for i in {1..60}; do
            if ip a | grep -q "tun0"; then
              echo "✅ VPN interface tun0 is up"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "❌ VPN connection timeout"
              grep -v -i -E "(password|secret|key|auth)" /tmp/openvpn.log || cat /tmp/openvpn.log
              exit 1
            fi
            sleep 1
          done

      - name: VPN Health Check
        run: |
          if ! ip a show tun0 2>/dev/null | grep -q "inet "; then
            echo "❌ VPN interface tun0 not found or has no IP"
            exit 1
          fi
          
          VPN_IP=$(ip a show tun0 | grep "inet " | awk '{print $2}' | cut -d'/' -f1)
          echo "✅ VPN connected with IP: $VPN_IP"
          
          if ! ping -c 3 ${{ secrets.REMOTE_SERVER_IP }} > /dev/null 2>&1; then
            echo "❌ Cannot reach remote server"
            exit 1
          fi
          echo "✅ Remote server is reachable"

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          set +x
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          umask 077
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          if ssh-keygen -l -f ~/.ssh/id_rsa > /dev/null 2>&1; then
            echo "✅ SSH key is valid"
          else
            echo "❌ SSH key format issue"
            exit 1
          fi
          
          cat > ~/.ssh/config << EOF
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
            IdentitiesOnly yes
            AddKeysToAgent no
          EOF
          chmod 600 ~/.ssh/config
          
          echo "✅ SSH key configured securely"

      - name: Test SSH Connection
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.SSH_USER }}@${{ secrets.REMOTE_SERVER_IP }} "echo '✅ SSH connection successful'"

      - name: Generate .env files from .env.example
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$IMAGE_TAG" | cut -c1-7)
          
          # Set computed image tags (not stored as secrets)
          export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${SHORT_SHA}"
          export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${SHORT_SHA}"
          
          # Generate .env from .env.example:
          #   1. If a GitHub secret matches the variable name → use the secret value
          #   2. If a shell env var is set (e.g. computed BACKEND_IMAGE) → use it
          #   3. If the .env.example value is a non-placeholder default → keep it
          #   4. If the value is a placeholder (<...>) and no secret/env → skip it
          generate_env() {
            local src="$1" dst="$2"
            : > "$dst"
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*#|^[[:space:]]*$ ]] && continue
              if [[ "$line" =~ ^([A-Za-z_][A-Za-z0-9_]*)=(.*) ]]; then
                local key="${BASH_REMATCH[1]}"
                local val="${BASH_REMATCH[2]}"
                local secret_val
                secret_val=$(echo "$ALL_SECRETS" | jq -r --arg k "$key" '.[$k] // empty')
                if [[ -n "$secret_val" ]]; then
                  printf '%s=%s\n' "$key" "$secret_val" >> "$dst"
                elif [[ -n "${!key}" ]]; then
                  printf '%s=%s\n' "$key" "${!key}" >> "$dst"
                elif [[ "$val" != \<* ]]; then
                  printf '%s=%s\n' "$key" "$val" >> "$dst"
                fi
              fi
            done < "$src"
          }
          
          generate_env deployment/dev/.env.example deployment/dev/.env
          generate_env deployment/dev/backend/.env.example deployment/dev/backend/.env
          generate_env deployment/dev/frontend/.env.example deployment/dev/frontend/.env
          
          echo "✅ Generated .env files:"
          echo "  Root:     $(wc -l < deployment/dev/.env) variables"
          echo "  Backend:  $(wc -l < deployment/dev/backend/.env) variables"
          echo "  Frontend: $(wc -l < deployment/dev/frontend/.env) variables"

      - name: Deploy to Remote Server
        run: |
          # Copy deployment directory (including generated .env files) to remote
          ssh ${{ secrets.SSH_USER }}@${{ secrets.REMOTE_SERVER_IP }} "mkdir -p ~/le_sesame_deploy"
          tar -C deployment/dev -czf - . | \
            ssh ${{ secrets.SSH_USER }}@${{ secrets.REMOTE_SERVER_IP }} "tar -C ~/le_sesame_deploy -xzf -"
          
          # Login to GitHub Container Registry on remote
          ssh ${{ secrets.SSH_USER }}@${{ secrets.REMOTE_SERVER_IP }} \
            "echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin"
          
          # Run the deploy script (handles image pull, service start, and health checks)
          ssh ${{ secrets.SSH_USER }}@${{ secrets.REMOTE_SERVER_IP }} \
            "cd ~/le_sesame_deploy && chmod +x scripts/deploy.sh && scripts/deploy.sh"
          
          echo "✅ Deployment completed"

      - name: Verify Deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.REMOTE_SERVER_IP }} \
            "cd ~/le_sesame_deploy && scripts/deploy.sh --status"

      - name: Run E2E Tests
        run: |
          # Install test dependencies on the runner
          pip install -r backend/requirements-test.txt

          # Run E2E tests against the deployed backend via SSH tunnel
          # Forward remote port 8000 to localhost:8000
          ssh -f -N -L 8000:localhost:8000 ${{ secrets.SSH_USER }}@${{ secrets.REMOTE_SERVER_IP }}

          # Run the E2E test suite (admin credentials for user approval/cleanup via API)
          E2E_API_URL=http://localhost:8000 \
          E2E_ADMIN_USERNAME=${{ secrets.E2E_ADMIN_USERNAME }} \
          E2E_ADMIN_PASSWORD=${{ secrets.E2E_ADMIN_PASSWORD }} \
          bash backend/tests/e2e/run_tests.sh

          # Kill the SSH tunnel
          pkill -f "ssh -f -N -L 8000:localhost:8000" || true

      - name: Disconnect VPN
        if: always()
        run: |
          echo "🔒 Disconnecting VPN..."
          sudo pkill -TERM openvpn 2>/dev/null || true
          sleep 3
          sudo pkill -9 openvpn 2>/dev/null || true
          echo "✅ VPN disconnected"

      - name: Secure cleanup
        if: always()
        run: |
          echo "🔒 Securely cleaning up all sensitive files..."
          
          for file in /tmp/vpn_private_key.pem /tmp/openvpn_config.ovpn ~/.ssh/id_rsa; do
            if [ -f "$file" ]; then
              sudo shred -fuz "$file" 2>/dev/null || sudo rm -f "$file"
              echo "  ✓ Deleted: $file"
            fi
          done
          
          sudo rm -f /tmp/openvpn.log ~/.ssh/config ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "✅ Secure cleanup completed"
