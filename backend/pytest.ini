[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    requires_llm: marks tests that require LLM to be configured (skipped if LLM unavailable)
    mistral: marks tests that require a Mistral API key
    openai: marks tests that require an OpenAI API key
    deepseek: marks tests that require a DeepSeek API key
    alibaba: marks tests that require an Alibaba/DashScope API key
    together: marks tests that require a Together AI API key
    vllm: marks tests that require a vLLM endpoint
    google: marks tests that require a Google API key
    bedrock: marks tests that require AWS Bedrock credentials
    anthropic: marks tests that require an Anthropic API key
