# Le Sésame - Local Development Full Stack Docker Compose
# Builds both services from source
#
# Usage:
#   docker-compose up -d --build
#   docker-compose logs -f

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: le-sesame-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-le_sesame}
      POSTGRES_USER: ${POSTGRES_USER:-le_sesame_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-le_sesame_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-le_sesame_user} -d ${POSTGRES_DB:-le_sesame}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - le-sesame-local

  # FastAPI Backend
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: le-sesame-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-le_sesame_user}:${POSTGRES_PASSWORD:-le_sesame_password}@postgres:5432/${POSTGRES_DB:-le_sesame}
    volumes:
      # Mount config file
      - ./backend/config.local.yaml:/app/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - le-sesame-local

  # React/Vite Frontend
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api
        - NEXT_PUBLIC_ENABLE_AUTH=true
    container_name: le-sesame-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - le-sesame-local

volumes:
  postgres-data:

networks:
  le-sesame-local:
    driver: bridge
